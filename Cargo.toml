[package]
name = "apollo-optimizer"
version = "0.1.0"
edition = "2021"

[dependencies]
sysinfo = "0.30"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4.4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
libc = "0.2"
ctrlc = { version = "3.4", features = ["termination"] }
toml = "0.8"
ureq = { version = "2.12", features = ["json"] }
