    <div class="field">Community: ${n._community_name}</div>
    <div class="field">Source: ${n._source_file || '-'}</div>
    <div class="field">Degree: ${n._degree}</div>
    ${neighborIds.length ? `<div class="field" style="margin-top:8px;color:#aaa;font-size:11px">Neighbors (${neighborIds.length})</div><div id="neighbors-list">${neighborItems}</div>` : ''}
  `;
}

function focusNode(nodeId) {
  network.focus(nodeId, { scale: 1.4, animation: true });
  network.selectNodes([nodeId]);
  showInfo(nodeId);
}

network.on('click', params => {
  if (params.nodes.length > 0) showInfo(params.nodes[0]);
  else document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect it</span>';
});

const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  searchResults.innerHTML = '';
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES.filter(n => n.label.toLowerCase().includes(q)).slice(0, 20);
  if (!matches.length) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  matches.forEach(n => {
    const el = document.createElement('div');
    el.className = 'search-item';
    el.textContent = n.label;
    el.style.borderLeft = `3px solid ${n.color.background}`;
    el.style.paddingLeft = '8px';
    el.onclick = () => {
      network.focus(n.id, { scale: 1.5, animation: true });
      network.selectNodes([n.id]);
      showInfo(n.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    };
    searchResults.appendChild(el);
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput)
    searchResults.style.display = 'none';
});

const hiddenCommunities = new Set();
const legendEl = document.getElementById('legend');
LEGEND.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>
    <span class="legend-label">${c.label}</span>
    <span class="legend-count">${c.count}</span>`;
  item.onclick = () => {
    if (hiddenCommunities.has(c.cid)) {
      hiddenCommunities.delete(c.cid);
      item.classList.remove('dimmed');
    } else {
      hiddenCommunities.add(c.cid);
      item.classList.add('dimmed');
    }
    const updates = RAW_NODES
      .filter(n => n.community === c.cid)
      .map(n => ({ id: n.id, hidden: hiddenCommunities.has(c.cid) }));
    nodesDS.update(updates);
  };
  legendEl.appendChild(item);
});
</script>
<script>
// Render hyperedges as shaded regions
const hyperedges = [{"id": "causal_reasoning_papers", "label": "Causal Reasoning Papers", "nodes": ["corpus_pearl2009", "corpus_granger1969", "corpus_rubin1974", "corpus_lamport1978"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "uncertainty_quantification_papers", "label": "Uncertainty Quantification Papers", "nodes": ["corpus_lakshminarayanan2017", "corpus_guo2017", "corpus_jaynes2003", "corpus_adams2007", "corpus_murphy2012"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "anomaly_detection_papers", "label": "Anomaly Detection Papers", "nodes": ["corpus_chandola2009", "corpus_page1954", "corpus_ramsauer2020", "corpus_bricken2023", "corpus_templeton2024"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "reliability_systems_papers", "label": "Reliability & Systems Papers", "nodes": ["corpus_gray1992", "corpus_nygard2018", "corpus_kleppmann2017", "corpus_lampson1974"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "memory_working_set_papers", "label": "Memory Management & Working Set Papers", "nodes": ["corpus_denning1968", "corpus_damos2023", "corpus_ileakage2023", "corpus_memtis2023", "corpus_drepper2007", "corpus_zipnn2024"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "self_improvement_papers", "label": "Self-Improvement & Meta-Learning Papers", "nodes": ["corpus_yuan2024", "corpus_doncieux2018", "corpus_nichol2018", "corpus_google_nl2025"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "bounded_rationality_papers", "label": "Bounded Rationality Papers", "nodes": ["corpus_simon1955", "corpus_peiwang2013", "corpus_auer2002", "corpus_russo2018", "corpus_kuncheva2004"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "prediction_forecasting_papers", "label": "Prediction & Forecasting Papers", "nodes": ["corpus_welch2006", "corpus_holtwinters", "corpus_shin2012", "corpus_huang2012", "corpus_baezayates2015", "corpus_tuli2022"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "affective_cognitive_papers", "label": "Affective & Cognitive Science Papers", "nodes": ["corpus_mcgaugh2004", "corpus_yerkes1908", "corpus_bliss1973", "corpus_occ1988", "corpus_bhatt2024", "corpus_peiwang2013"], "relation": "participate_in", "confidence": "EXTRACTED", "confidence_score": 1.0, "source_file": "papers/apollo_papers_corpus.md"}, {"id": "deep_learning_neural_papers", "label": "Deep Learning & Neural Architecture Papers", "nodes": ["corpus_ramsauer2020", "corpus_bricken2023", "corpus_templeton2024", "corpus_dettmers2022", "corpus_zerveas2021", "corpus_vaswani2017", "corpus_tuli2022"], "relation": "participate_in", "confidence": "INFERRED", "confidence_score": 0.95, "source_file": "papers/apollo_papers_corpus.md"}];
function drawHyperedges() {
    const canvas = network.canvas.frame.canvas;
    const ctx = canvas.getContext('2d');
    hyperedges.forEach(h => {
        const positions = h.nodes
            .map(nid => network.getPositions([nid])[nid])
            .filter(p => p !== undefined);
        if (positions.length < 2) return;
        // Draw convex hull as filled polygon
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = '#6366f1';
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const scale = network.getScale();
        const offset = network.getViewPosition();
        const toCanvas = (p) => ({
            x: (p.x - offset.x) * scale + canvas.width / 2,
            y: (p.y - offset.y) * scale + canvas.height / 2
        });
        const pts = positions.map(toCanvas);
        // Expand hull slightly
        const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
        const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
        const expanded = pts.map(p => ({
            x: cx + (p.x - cx) * 1.15,
            y: cy + (p.y - cy) * 1.15
        }));
        ctx.moveTo(expanded[0].x, expanded[0].y);
        expanded.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 0.4;
        ctx.stroke();
        // Label
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#4f46e5';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(h.label, cx, cy - 5);
        ctx.restore();
    });
}
network.on('afterDrawing', drawHyperedges);
</script>
